services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: agrogemini-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "Oracle123"
      APP_USER: "AGROGEMINI"
      APP_USER_PASSWORD: "AgroGemini123"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./migrations:/opt/oracle/scripts/migrations:ro
    restart: unless-stopped

volumes:
  oracle_data:
    name: agrogemini_oracle_data
